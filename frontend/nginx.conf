server {
    listen 80;

    # Serve the built React app
    root /usr/share/nginx/html;
    index index.html;

    # React Router support — fallback all routes to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to backend microservices (Docker internal network)
    location /api/finance/ {
        proxy_pass http://finance_service:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/invoice/ {
        proxy_pass http://invoice_service:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/inventory/ {
        proxy_pass http://inventory_service:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/ai/ {
        proxy_pass http://ai_prediction_service:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/recommendation/ {
        proxy_pass http://recommendation_service:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/user/ {
        proxy_pass http://user_service:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
