version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: nexaflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d nexaflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: user
      RABBITMQ_DEFAULT_PASS: password
    ports:
      - "5672:5672" # AMQP protocol port
      - "15672:15672" # Management UI
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 5s
      timeout: 5s
      retries: 5

  finance_service:
    build: ./backend/finance_service
    environment:
      DATABASE_URL: "postgresql://user:password@postgres:5432/nexaflow"
      RABBITMQ_URL: "rabbitmq"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  invoice_service:
    build: ./backend/invoice_service
    environment:
      DATABASE_URL: "postgresql://user:password@postgres:5432/nexaflow"
      RABBITMQ_URL: "rabbitmq"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  inventory_service:
    build: ./backend/inventory_service
    environment:
      DATABASE_URL: "postgresql://user:password@postgres:5432/nexaflow"
      RABBITMQ_URL: "rabbitmq"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  ai_prediction_service:
    build: ./backend/ai_prediction_service
    environment:
      DATABASE_URL: "postgresql://user:password@postgres:5432/nexaflow"
      RABBITMQ_URL: "rabbitmq"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  recommendation_service:
    build: ./backend/recommendation_service
    environment:
      DATABASE_URL: "postgresql://user:password@postgres:5432/nexaflow"
      RABBITMQ_URL: "rabbitmq"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  api_gateway:
    build:
      context: .
      dockerfile: ./backend/gateway/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - finance_service
      - invoice_service
      - inventory_service
      - ai_prediction_service
      - recommendation_service

volumes:
  postgres_data:
